name: Feature request
description: Suggest a Mneme Memory MCP improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: What should the user or agent be able to do?
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Constraints, examples, or tradeoffs.
